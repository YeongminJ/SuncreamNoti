<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_shared.css" />
    <style>
      body {
        width: 636px;
        height: 1048px;
        background: #FFFFFF;
        color: #0F172A;
      }
      /* Status bar */
      .statusbar {
        position: relative;
        height: 44px;
        padding: 0 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-family: "Apple SD Gothic Neo", "Pretendard", system-ui, sans-serif;
        font-weight: 700;
        font-size: 16px;
        color: #0F172A;
      }
      .sb-time { letter-spacing: -0.3px; }
      .sb-right { display: flex; align-items: center; gap: 6px; }
      .sb-icon { width: 18px; height: 12px; }
      .sb-batt {
        position: relative;
        width: 28px; height: 13px;
        border: 1.5px solid #0F172A;
        border-radius: 4px;
        padding: 1.5px;
      }
      .sb-batt::after {
        content: "";
        position: absolute;
        right: -4px; top: 3px;
        width: 2px; height: 5px;
        background: #0F172A;
        border-radius: 0 2px 2px 0;
      }
      .sb-batt-fill { height: 100%; width: 80%; background: #0F172A; border-radius: 2px; }

      .phone {
        position: relative;
        width: 636px;
        height: calc(1048px - 44px);
      }

      /* Top */
      .top { padding: 24px 32px 18px; }
      .top-title {
        font-size: 32px;
        font-weight: 800;
        color: #0F172A;
        line-height: 1.2;
        letter-spacing: -1px;
      }
      .top-sub {
        font-size: 16px;
        color: #64748B;
        margin-top: 8px;
        font-weight: 500;
      }

      /* Reward card */
      .reward {
        margin: 12px 32px 0;
        background: linear-gradient(135deg, #FF8A4C 0%, #FF6A2D 100%);
        color: #FFFFFF;
        border-radius: 24px;
        padding: 36px 28px 32px;
        text-align: center;
        position: relative;
        overflow: hidden;
        box-shadow: 0 18px 32px rgba(255, 106, 45, 0.34);
      }
      .reward::before {
        content: "";
        position: absolute;
        right: -50px; top: -50px;
        width: 240px; height: 240px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255, 246, 214, 0.22), transparent 70%);
        pointer-events: none;
      }
      .reward::after {
        content: "";
        position: absolute;
        left: -40px; bottom: -40px;
        width: 180px; height: 180px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255, 214, 107, 0.18), transparent 70%);
        pointer-events: none;
      }
      .r-bubble {
        margin: 0 auto 14px;
        width: 84px; height: 84px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.22);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 0 5px rgba(255,255,255,0.12);
        position: relative;
      }
      .r-bubble svg { width: 70%; height: 70%; }
      .r-label {
        font-size: 15px;
        opacity: 0.92;
        font-weight: 600;
        letter-spacing: -0.2px;
      }
      .r-amount {
        font-size: 76px;
        font-weight: 900;
        line-height: 1;
        letter-spacing: -3px;
        margin-top: 8px;
        text-shadow: 0 4px 12px rgba(120, 40, 0, 0.3);
      }
      .r-amount .won {
        font-size: 26px;
        font-weight: 800;
        margin-left: 6px;
        letter-spacing: -0.5px;
      }
      .r-foot {
        font-size: 14px;
        opacity: 0.92;
        margin-top: 14px;
        font-weight: 500;
      }

      /* Bonus card */
      .bonus {
        margin: 22px 32px 0;
        background: #F8FAFC;
        border-radius: 16px;
        padding: 22px 22px 18px;
      }
      .bonus-title {
        font-size: 17px;
        font-weight: 800;
        color: #0F172A;
        letter-spacing: -0.4px;
      }
      .bonus-meta {
        font-size: 13px;
        color: #64748B;
        margin-top: 6px;
        font-weight: 500;
      }
      .bonus-btn {
        margin-top: 16px;
        height: 50px;
        border-radius: 14px;
        background: #FFE7D6;
        color: #FF6A2D;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        font-weight: 800;
        letter-spacing: -0.3px;
        border: 1.5px solid #FFCAA8;
      }

      /* CTA */
      .cta-wrap {
        position: absolute;
        left: 0; right: 0; bottom: 0;
        padding: 16px 32px 36px;
        background: linear-gradient(to top,
          #FFFFFF 65%,
          rgba(255,255,255,0.92) 80%,
          rgba(255,255,255,0));
      }
      .cta {
        height: 64px;
        border-radius: 18px;
        background: linear-gradient(135deg, #FF8A4C 0%, #FF6A2D 100%);
        color: #FFFFFF;
        font-size: 19px;
        font-weight: 800;
        letter-spacing: -0.4px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 14px 28px rgba(255, 106, 45, 0.42);
      }
      .home-indicator {
        position: absolute;
        left: 50%; bottom: 10px; transform: translateX(-50%);
        width: 130px; height: 5px;
        border-radius: 3px;
        background: #0F172A;
        opacity: 0.85;
      }

      /* Confetti accent dots around reward card */
      .conf {
        position: absolute;
        pointer-events: none;
      }
      .conf.c1 { top: 28px; left: 22px; width: 12px; height: 12px;
        background: #FFE187; border-radius: 50%; }
      .conf.c2 { top: 60px; right: 30px; width: 8px; height: 8px;
        background: #FFFFFF; border-radius: 50%; opacity: 0.85; }
      .conf.c3 { top: 110px; left: 40px; width: 6px; height: 18px;
        background: #FFD66B; border-radius: 3px; transform: rotate(20deg); }
      .conf.c4 { bottom: 42px; right: 36px; width: 10px; height: 10px;
        background: #FFFFFF; border-radius: 2px; transform: rotate(45deg); opacity: 0.9; }
      .conf.c5 { bottom: 70px; left: 30px; width: 8px; height: 8px;
        background: #FFE187; border-radius: 50%; }
    </style>
  </head>
  <body>
    <!-- Status bar -->
    <div class="statusbar">
      <div class="sb-time">9:41</div>
      <div class="sb-right">
        <svg class="sb-icon" viewBox="0 0 18 12" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="8" width="3" height="4" rx="0.6" fill="#0F172A"/>
          <rect x="5" y="6" width="3" height="6" rx="0.6" fill="#0F172A"/>
          <rect x="10" y="3" width="3" height="9" rx="0.6" fill="#0F172A"/>
          <rect x="15" y="0" width="3" height="12" rx="0.6" fill="#0F172A"/>
        </svg>
        <svg class="sb-icon" viewBox="0 0 18 12" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 11 L11 9 Q9 7.5 7 9 Z" fill="#0F172A"/>
          <path d="M3.5 5.5 Q9 1 14.5 5.5 L12.5 7.5 Q9 4 5.5 7.5 Z" fill="#0F172A" opacity="0.85"/>
          <path d="M0.5 2.5 Q9 -3.5 17.5 2.5 L15.5 4.5 Q9 -0.5 2.5 4.5 Z" fill="#0F172A" opacity="0.7"/>
        </svg>
        <div class="sb-batt"><div class="sb-batt-fill"></div></div>
      </div>
    </div>

    <div class="phone">
      <!-- Top -->
      <div class="top">
        <div class="top-title">적립됐어요!</div>
        <div class="top-sub">2번째 도포 · 적립 완료</div>
      </div>

      <!-- Reward card -->
      <div class="reward">
        <div class="conf c1"></div>
        <div class="conf c2"></div>
        <div class="conf c3"></div>
        <div class="conf c4"></div>
        <div class="conf c5"></div>

        <div class="r-bubble">
          <!-- party / celebration burst -->
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <!-- cone -->
            <path d="M 22 78 L 50 30 L 64 88 Z"
                  fill="#FFE187" stroke="#7A2E00" stroke-width="4"
                  stroke-linejoin="round"/>
            <path d="M 28 70 Q 36 64 46 70 Q 36 76 28 70 Z" fill="#FF6A2D"/>
            <path d="M 36 80 Q 46 74 56 82 Q 46 86 36 80 Z" fill="#10B981"/>
            <!-- bursts -->
            <g stroke="#FFFFFF" stroke-width="4" stroke-linecap="round">
              <line x1="68" y1="22" x2="78" y2="14"/>
              <line x1="74" y1="38" x2="86" y2="36"/>
              <line x1="58" y1="14" x2="60" y2="4"/>
            </g>
            <circle cx="84" cy="22" r="3" fill="#FFFFFF"/>
            <circle cx="14" cy="40" r="3" fill="#FFFFFF"/>
            <circle cx="80" cy="56" r="2.5" fill="#FFFFFF"/>
          </svg>
        </div>
        <div class="r-label">이번 회차 적립</div>
        <div class="r-amount">+3<span class="won">원</span></div>
        <div class="r-foot">기본 3원</div>
      </div>

      <!-- Bonus card -->
      <div class="bonus">
        <div class="bonus-title">광고 더 보고 +1원 받기</div>
        <div class="bonus-meta">남은 횟수 2/2 · 테스트 광고</div>
        <div class="bonus-btn">광고 보고 +1원</div>
      </div>

      <!-- CTA -->
      <div class="cta-wrap">
        <div class="cta">확인</div>
        <div class="home-indicator"></div>
      </div>
    </div>
  </body>
</html>
