<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_shared.css" />
    <style>
      body {
        width: 636px;
        height: 1048px;
        background: #FFFFFF;
        color: #0F172A;
      }
      /* iOS-style status bar */
      .statusbar {
        position: relative;
        height: 44px;
        padding: 0 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-family: "Apple SD Gothic Neo", "Pretendard", system-ui, sans-serif;
        font-weight: 700;
        font-size: 16px;
        color: #0F172A;
      }
      .sb-time { letter-spacing: -0.3px; }
      .sb-right { display: flex; align-items: center; gap: 6px; }
      .sb-icon { width: 18px; height: 12px; }
      .sb-batt {
        position: relative;
        width: 28px; height: 13px;
        border: 1.5px solid #0F172A;
        border-radius: 4px;
        padding: 1.5px;
      }
      .sb-batt::after {
        content: "";
        position: absolute;
        right: -4px; top: 3px;
        width: 2px; height: 5px;
        background: #0F172A;
        border-radius: 0 2px 2px 0;
      }
      .sb-batt-fill {
        height: 100%; width: 80%;
        background: #0F172A;
        border-radius: 2px;
      }

      .phone {
        position: relative;
        width: 636px;
        height: calc(1048px - 44px);
        padding: 0;
      }

      .head { padding: 38px 32px 0; }
      .head h1 {
        font-size: 36px;
        font-weight: 800;
        line-height: 1.3;
        letter-spacing: -1px;
        color: #0F172A;
        margin: 0;
      }

      /* Hero overlapping bubbles */
      .hero {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 56px 0 44px;
      }
      .hero-wrap {
        position: relative;
        width: 300px;
        height: 188px;
      }
      .bubble {
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        position: absolute;
        box-shadow:
          0 20px 32px rgba(255, 106, 45, 0.22),
          0 0 0 6px rgba(255, 255, 255, 0.65) inset;
      }
      .bubble.tube {
        left: 0; top: 0;
        width: 174px; height: 174px;
        background:
          radial-gradient(circle at 30% 28%, #FFB783 0%, transparent 55%),
          linear-gradient(135deg, #FF9B3C 0%, #FF7E2E 100%);
      }
      .bubble.sun {
        right: 0; top: 30px;
        width: 144px; height: 144px;
        background:
          radial-gradient(circle at 30% 28%, #FFF1B3 0%, transparent 55%),
          linear-gradient(135deg, #FFE187 0%, #FFD66B 100%);
      }
      .bubble svg { width: 70%; height: 70%; }

      /* Feature stepper */
      .features { padding: 0 32px; }
      .feat {
        display: flex;
        gap: 22px;
        position: relative;
        padding-bottom: 32px;
      }
      .feat:last-child { padding-bottom: 0; }
      .feat-left {
        display: flex;
        flex-direction: column;
        align-items: center;
        flex-shrink: 0;
      }
      .feat-bubble {
        width: 64px; height: 64px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        z-index: 2;
      }
      .feat-bubble.b1 { background: #FFF3EC; }
      .feat-bubble.b2 { background: #FEF3C7; }
      .feat-bubble.b3 { background: #DCFCE7; }
      .feat-bubble svg { width: 60%; height: 60%; }
      .feat-line {
        width: 2.5px;
        flex: 1;
        margin-top: 8px;
        margin-bottom: -8px;
        background:
          repeating-linear-gradient(to bottom,
            #E2E8F0 0 5px, transparent 5px 10px);
      }
      .feat-text {
        flex: 1;
        padding-top: 10px;
      }
      .feat-title {
        font-size: 20px;
        font-weight: 800;
        color: #0F172A;
        line-height: 1.4;
        letter-spacing: -0.4px;
        margin-bottom: 6px;
      }
      .feat-desc {
        font-size: 16px;
        color: #64748B;
        line-height: 1.5;
        font-weight: 500;
      }

      /* CTA */
      .cta-wrap {
        position: absolute;
        left: 0; right: 0;
        bottom: 0;
        padding: 18px 32px 36px;
        background: linear-gradient(to top,
          #FFFFFF 65%,
          rgba(255,255,255,0.92) 80%,
          rgba(255,255,255,0));
      }
      .cta {
        height: 64px;
        border-radius: 18px;
        background: linear-gradient(135deg, #FF9B3C 0%, #FF7E2E 100%);
        color: #FFFFFF;
        font-size: 19px;
        font-weight: 800;
        letter-spacing: -0.4px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 14px 28px rgba(255, 106, 45, 0.42);
      }
      /* Home indicator */
      .home-indicator {
        position: absolute;
        left: 50%;
        bottom: 10px;
        transform: translateX(-50%);
        width: 130px;
        height: 5px;
        border-radius: 3px;
        background: #0F172A;
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <!-- Status bar -->
    <div class="statusbar">
      <div class="sb-time">9:41</div>
      <div class="sb-right">
        <!-- signal -->
        <svg class="sb-icon" viewBox="0 0 18 12" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="8" width="3" height="4" rx="0.6" fill="#0F172A" />
          <rect x="5" y="6" width="3" height="6" rx="0.6" fill="#0F172A" />
          <rect x="10" y="3" width="3" height="9" rx="0.6" fill="#0F172A" />
          <rect x="15" y="0" width="3" height="12" rx="0.6" fill="#0F172A" />
        </svg>
        <!-- wifi -->
        <svg class="sb-icon" viewBox="0 0 18 12" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 11 L11 9 Q9 7.5 7 9 Z" fill="#0F172A" />
          <path d="M3.5 5.5 Q9 1 14.5 5.5 L12.5 7.5 Q9 4 5.5 7.5 Z"
                fill="#0F172A" opacity="0.85" />
          <path d="M0.5 2.5 Q9 -3.5 17.5 2.5 L15.5 4.5 Q9 -0.5 2.5 4.5 Z"
                fill="#0F172A" opacity="0.7" />
        </svg>
        <div class="sb-batt"><div class="sb-batt-fill"></div></div>
      </div>
    </div>

    <div class="phone">
      <!-- Header -->
      <div class="head">
        <h1>매일 선크림 바르고<br/>피부도, 포인트도 챙겨요</h1>
      </div>

      <!-- Hero: overlapping orange + yellow bubbles -->
      <div class="hero">
        <div class="hero-wrap">
          <div class="bubble tube">
            <!-- tiny sunscreen tube SVG -->
            <svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="t1body" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#FFFDF5" />
                  <stop offset="100%" stop-color="#FFE9B5" />
                </linearGradient>
                <linearGradient id="t1cap" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#FFE187" />
                  <stop offset="100%" stop-color="#FFB347" />
                </linearGradient>
                <linearGradient id="t1lab" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#FF9B3C" />
                  <stop offset="100%" stop-color="#FF7E2E" />
                </linearGradient>
              </defs>
              <rect x="58" y="68" width="100" height="142" rx="22"
                    fill="url(#t1body)" stroke="#7A2E00" stroke-width="6"/>
              <path d="M 58 210 Q 64 224 78 224 L 138 224 Q 152 224 158 210"
                    fill="none" stroke="#7A2E00" stroke-width="6"
                    stroke-linejoin="round" stroke-linecap="round"/>
              <line x1="78" y1="216" x2="78" y2="224" stroke="#7A2E00" stroke-width="3"/>
              <line x1="98" y1="216" x2="98" y2="224" stroke="#7A2E00" stroke-width="3"/>
              <line x1="118" y1="216" x2="118" y2="224" stroke="#7A2E00" stroke-width="3"/>
              <line x1="138" y1="216" x2="138" y2="224" stroke="#7A2E00" stroke-width="3"/>
              <path d="M 58 86 Q 108 60 158 86"
                    fill="url(#t1body)" stroke="#7A2E00" stroke-width="6"/>
              <rect x="96" y="44" width="24" height="22"
                    fill="url(#t1body)" stroke="#7A2E00" stroke-width="6"/>
              <rect x="84" y="14" width="48" height="34" rx="8"
                    fill="url(#t1cap)" stroke="#7A2E00" stroke-width="6"/>
              <rect x="64" y="108" width="88" height="68" rx="10"
                    fill="url(#t1lab)" stroke="#7A2E00" stroke-width="5"/>
              <text x="108" y="148" text-anchor="middle"
                    font-family="'Apple SD Gothic Neo','Pretendard',sans-serif"
                    font-weight="900" font-size="30" fill="#FFFFFF">SPF</text>
              <text x="108" y="172" text-anchor="middle"
                    font-family="'Apple SD Gothic Neo','Pretendard',sans-serif"
                    font-weight="900" font-size="20" fill="#FFF6D6">50+</text>
            </svg>
          </div>
          <div class="bubble sun">
            <!-- sun face SVG -->
            <svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
              <g stroke="#7A4E00" stroke-width="9" stroke-linecap="round">
                <line x1="120" y1="22" x2="120" y2="48"/>
                <line x1="120" y1="218" x2="120" y2="192"/>
                <line x1="22" y1="120" x2="48" y2="120"/>
                <line x1="218" y1="120" x2="192" y2="120"/>
                <line x1="50" y1="50" x2="68" y2="68"/>
                <line x1="190" y1="50" x2="172" y2="68"/>
                <line x1="50" y1="190" x2="68" y2="172"/>
                <line x1="190" y1="190" x2="172" y2="172"/>
              </g>
              <circle cx="120" cy="120" r="62" fill="#FFE9A8"
                      stroke="#7A4E00" stroke-width="9"/>
              <circle cx="100" cy="112" r="6" fill="#7A4E00"/>
              <circle cx="140" cy="112" r="6" fill="#7A4E00"/>
              <path d="M 100 138 Q 120 152 140 138" stroke="#7A4E00"
                    stroke-width="6" stroke-linecap="round" fill="none"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- Feature stepper -->
      <div class="features">
        <div class="feat">
          <div class="feat-left">
            <div class="feat-bubble b1">
              <!-- ☀️ small -->
              <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <g stroke="#B45309" stroke-width="5" stroke-linecap="round">
                  <line x1="50" y1="10" x2="50" y2="22"/>
                  <line x1="50" y1="78" x2="50" y2="90"/>
                  <line x1="10" y1="50" x2="22" y2="50"/>
                  <line x1="78" y1="50" x2="90" y2="50"/>
                  <line x1="22" y1="22" x2="30" y2="30"/>
                  <line x1="78" y1="22" x2="70" y2="30"/>
                  <line x1="22" y1="78" x2="30" y2="70"/>
                  <line x1="78" y1="78" x2="70" y2="70"/>
                </g>
                <circle cx="50" cy="50" r="20" fill="#FFD66B"
                        stroke="#B45309" stroke-width="5"/>
              </svg>
            </div>
            <div class="feat-line"></div>
          </div>
          <div class="feat-text">
            <div class="feat-title">자외선은 피부 노화의 80% 원인이에요</div>
            <div class="feat-desc">매일 선크림이 가장 효과적인 안티에이징이에요</div>
          </div>
        </div>

        <div class="feat">
          <div class="feat-left">
            <div class="feat-bubble b2">
              <!-- 🧴 small -->
              <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <rect x="32" y="28" width="36" height="56" rx="9"
                      fill="#FFFDF5" stroke="#7A2E00" stroke-width="4.5"/>
                <rect x="38" y="14" width="24" height="18" rx="4"
                      fill="#FFB347" stroke="#7A2E00" stroke-width="4"/>
                <rect x="36" y="46" width="28" height="22" rx="4"
                      fill="#FF9B3C" stroke="#7A2E00" stroke-width="3.5"/>
                <text x="50" y="62" text-anchor="middle"
                      font-family="'Apple SD Gothic Neo',sans-serif"
                      font-weight="900" font-size="11" fill="#FFFFFF">SPF</text>
              </svg>
            </div>
            <div class="feat-line"></div>
          </div>
          <div class="feat-text">
            <div class="feat-title">2~3시간마다 다시 발라야 해요</div>
            <div class="feat-desc">오늘의 권장 시간을 한눈에 보여드려요</div>
          </div>
        </div>

        <div class="feat">
          <div class="feat-left">
            <div class="feat-bubble b3">
              <!-- 🎁 small gift -->
              <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <rect x="18" y="40" width="64" height="44" rx="4"
                      fill="#FF9B3C" stroke="#065F46" stroke-width="4"/>
                <rect x="18" y="34" width="64" height="14" rx="3"
                      fill="#FFB347" stroke="#065F46" stroke-width="4"/>
                <rect x="44" y="34" width="12" height="50"
                      fill="#FFE187" stroke="#065F46" stroke-width="3.5"/>
                <path d="M 44 34 Q 30 22 32 14 Q 40 12 50 30"
                      fill="#FFE187" stroke="#065F46" stroke-width="3.5"/>
                <path d="M 56 34 Q 70 22 68 14 Q 60 12 50 30"
                      fill="#FFE187" stroke="#065F46" stroke-width="3.5"/>
              </svg>
            </div>
          </div>
          <div class="feat-text">
            <div class="feat-title">광고 보고 하루 최대 15원 받아요</div>
            <div class="feat-desc">꾸준히 발라서 포인트도 챙겨가세요</div>
          </div>
        </div>
      </div>

      <!-- CTA -->
      <div class="cta-wrap">
        <div class="cta">내 피부 보호 시작하기</div>
        <div class="home-indicator"></div>
      </div>
    </div>
  </body>
</html>
